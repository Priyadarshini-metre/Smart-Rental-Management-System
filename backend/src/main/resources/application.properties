# Server configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (HS256 requires a 256-bit secret key)
# Set JWT_SECRET environment variable in production - never hardcode secrets
smartrental.app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
smartrental.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Logging configurations
logging.level.org.springframework.security=INFO
logging.level.com.smartrentalmanagement=DEBUG

# Disable SQL logging in production (set to false via env var)
spring.jpa.show-sql=${SHOW_SQL:false}

# Enable handling of request bodies for validation
spring.mvc.converters.preferred-json-mapper=jackson
